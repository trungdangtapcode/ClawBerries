services:
  postgres:
    image: postgres:17-alpine
    container_name: clawberries-postgres
    environment:
      POSTGRES_USER: clawberries
      POSTGRES_PASSWORD: clawberries
      POSTGRES_DB: clawberries
    ports:
      - "5435:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: clawberries-redis
    ports:
      - "6375:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
